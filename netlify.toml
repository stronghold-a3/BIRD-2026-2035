[build]
  # Publish the static HTML files from the public folder
  publish = "public"
  # Tell Netlify where the serverless functions live
  functions = "netlify/functions"

# This routes frontend calls from "/api/submit" to the Netlify function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true
